<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TailWind CSS</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1 class="text-center text-2xl font-semibold">Activity</h1>
    <br /><br /><br />
    <hr />
    <br /><br />
    <div
      class="border text-center rounded-lg h-[40vh] w-[80vh] m-auto flex flex-wrap"
    >
      <div class=" w-full">
        <h1
          class="rounded-t-lg text-white flex justify-center items-center font-semibold bg-linear-to-r from-cyan-500 to-blue-500 text-xl h-[12vh]"
        >
          News you can Trust.
        </h1>
      </div>
      <div class="w-full">
        <h1 class="font-bold">Stay up to date with the Latest!</h1>
        <p class="font-medium">
          Subscribe to our newslatter for the latest news straight into your
          inbox
        </p>
        <form>
          <input
            placeholder="you@example.com"
            class="m-2 rounded-lg bg-slate-200 px-[6%] p-2 text-center"
          /><br />
          <button
            class="border px-[11%] p-1 rounded-2xl mb-5 bg-blue-500 text-white font-medium"
          >
            Subscribe Now
          </button>
        </form>
        <p class="text-sm">We value your privacy</p>
      </div>
    </div>
  </body>
</html>
